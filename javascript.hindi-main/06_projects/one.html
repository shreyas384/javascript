<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="../styles.css" />
    <title>JavaScript Background Color Switcher</title>
  </head>
  <style>
    h1 {
      text-align: center;
      border: 2px solid black;
      background-color:yellow;
      border-radius: 20px;
      height: 50px;
      text-align: center;
      line-height: 50px;
      
    }
    .canvas {
      display: flex;
      flex-direction:column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .button {
      width: 200px;
      height:150px;
      border-radius:20px;
      margin: 10px;
      cursor: pointer;
      border: 2px solid black;
      border-image: fill;
    }
    #image {
      background-image:url(image.png);
         background-size: cover;

    }
    #image2{
    
      background-image: url(image2.jpg);
      background-size: cover;
    }
    #image3{
      
        background-image: url(image3.jpg);  
        background-size: cover;
    }
  </style>
  <body>
    <h1>Image preview centre</h1>
 
    <div class="canvas">
      
        
      
      <span class="button" id="image"></span>
      <span class="button" id="image2"></span> 
      <span class="button" id="image3"></span>
    
      <h2>
        Try clicking on one of the image above
        <span>to change the background image of this page!</span>
      </h2>
    </div>
    <script src="first/image switcher.js"></script>
  </body>
</html>
